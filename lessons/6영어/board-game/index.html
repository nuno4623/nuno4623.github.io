<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>6학년 영어 부루마블</title>
<!-- 외부 요청 허용: Jua 폰트, 점수 제출용 Google Form POST, 같이하기(멀티) 설정 시에만 Firebase SDK -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
:root{
  --board-bg:#f8f4e9;      /* 보드 바탕: 크림(종이 질감) */
  --board-frame:#1e3a5f;   /* 보드 외곽 프레임: 딥 네이비 */
  --cell-bg:#ffffff;       /* 칸 기본 바탕 */
  --cell-line:#d8d2c4;     /* 칸 구분선 */
  --center-bg:#eef3ea;     /* 중앙 필드: 연한 그린 */
  --gold:#f5c542;          /* 황금열쇠/포인트 강조 */
  --team-1:#e53935; --team-2:#1e88e5; --team-3:#fdd835; --team-4:#43a047;
  --ink:#22303a; --muted:#7a8a93;
  --jua:'Jua','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  --sys:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--sys);background:#e8e2d4;color:var(--ink);overflow:hidden;
  line-height:1.45; /* 폰트 폴백 시에도 레이아웃 유지 */
  touch-action:manipulation}
button{font-family:inherit;line-height:1.45;cursor:pointer;touch-action:manipulation}
.jua{font-family:var(--jua)}
.screen{position:fixed;inset:0;display:none}
.screen.on{display:flex}

/* ───────── 시작 화면 ───────── */
#startScreen{align-items:center;justify-content:center;background:
  radial-gradient(circle at 20% 15%, #fdf9ec 0%, #efe8d6 60%, #e4dcc6 100%);overflow:auto}
.setup-card{background:#fff;border-radius:24px;box-shadow:0 12px 40px rgba(30,58,95,.18);
  padding:26px 26px 24px;width:min(600px,94vw);margin:16px auto;border-top:10px solid var(--board-frame)}
.setup-title{font-family:var(--jua);font-size:32px;color:var(--board-frame);text-align:center;letter-spacing:.02em}
.setup-sub{text-align:center;color:var(--muted);font-size:14px;margin:4px 0 16px}
.field{margin-bottom:16px}
.field>label{display:block;font-weight:800;font-size:14px;margin-bottom:8px;color:var(--board-frame)}
select{width:100%;min-height:52px;font-size:16px;border:2px solid var(--cell-line);border-radius:12px;
  padding:0 14px;background:#fff;font-family:inherit;color:var(--ink)}
.seg{display:flex;gap:8px}
.seg button{flex:1;min-height:52px;border:2px solid var(--cell-line);background:#fff;border-radius:12px;
  font-size:16px;font-weight:800;color:var(--muted);padding:4px}
.seg button.sel{background:var(--board-frame);border-color:var(--board-frame);color:#fff}
.seg button .small{display:block;font-size:11px;font-weight:600;opacity:.75}
/* 모드 탭 */
.mode-tabs{display:flex;gap:8px;margin-bottom:16px}
.mode-tabs button{flex:1;min-height:58px;border:2px solid var(--cell-line);background:#fff;border-radius:14px;
  font-family:var(--jua);font-size:19px;color:var(--muted)}
.mode-tabs button.sel{background:var(--gold);border-color:#cfa32a;color:#5c4300}
/* 반/번호 스테퍼 */
.stepper-row{display:flex;gap:12px}
.stepper-box{flex:1}
.stepper{display:flex;align-items:center;gap:6px;border:2px solid var(--cell-line);border-radius:12px;padding:4px}
.stepper button{width:52px;min-height:48px;border:none;border-radius:9px;background:#eef1f4;
  font-size:24px;font-weight:900;color:var(--board-frame);flex-shrink:0}
.stepper button:active{background:#dde3e9}
.stepper .st-val{flex:1;text-align:center;font-family:var(--jua);font-size:26px}
/* 배정 팀 표시 */
#teamAssign{display:flex;align-items:center;justify-content:center;gap:12px;background:#fafaf6;
  border:2px dashed var(--cell-line);border-radius:14px;padding:12px;min-height:64px}
#teamAssign .big-dot{width:34px;height:34px;border-radius:50%;border:3px solid rgba(0,0,0,.12)}
#teamAssign .tx{font-family:var(--jua);font-size:26px}
.team-names{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.team-name-row{display:flex;align-items:center;gap:8px;border:2px solid var(--cell-line);border-radius:12px;padding:6px 10px}
.team-name-row .dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.12)}
.team-name-row input{border:none;outline:none;width:100%;min-height:38px;font-size:16px;font-family:inherit}
/* 같이하기(멀티) 옵션 */
.join-tabs{display:flex;gap:8px;margin-bottom:12px}
.join-tabs button{flex:1;min-height:48px;border:2px solid var(--cell-line);background:#fff;border-radius:12px;font-weight:800;color:var(--muted)}
.join-tabs button.sel{background:var(--board-frame);border-color:var(--board-frame);color:#fff}
#roomCodeInput{width:100%;min-height:52px;font-size:22px;letter-spacing:.2em;text-align:center;
  border:2px solid var(--cell-line);border-radius:12px;font-family:var(--jua);color:var(--ink)}
#startBtn{width:100%;min-height:60px;border:none;border-radius:14px;background:var(--gold);
  color:#5c4300;font-family:var(--jua);font-size:24px;box-shadow:0 4px 0 #cfa32a;margin-top:4px}
#startBtn:active{transform:translateY(2px);box-shadow:0 2px 0 #cfa32a}

/* 이어하기 다이얼로그 */
#resumeBox{position:fixed;inset:0;background:rgba(30,58,95,.55);display:none;align-items:center;justify-content:center;z-index:60}
#resumeBox.on{display:flex}
.resume-card{background:#fff;border-radius:20px;padding:28px 24px;width:min(420px,90vw);text-align:center}
.resume-card h2{font-family:var(--jua);font-size:24px;color:var(--board-frame);margin-bottom:6px}
.resume-card p{color:var(--muted);font-size:14px;margin-bottom:18px}
.resume-card .btns{display:flex;gap:10px}
.resume-card button{flex:1;min-height:58px;border-radius:12px;font-size:17px;font-weight:800;border:2px solid var(--cell-line);background:#fff}
.resume-card button.primary{background:var(--board-frame);border-color:var(--board-frame);color:#fff}

/* ───────── 게임 화면 ───────── */
#gameScreen{background:#e8e2d4;padding:10px;gap:10px}
@media (orientation:landscape){
  #gameScreen{flex-direction:row;align-items:center;justify-content:center}
  #boardWrap{height:calc(100vh - 20px);width:calc(100vh - 20px);max-width:62vw;max-height:62vw}
  #teamPanel{width:min(300px,32vw);max-height:calc(100vh - 20px);overflow:auto}
}
@media (orientation:portrait){
  #gameScreen{flex-direction:column;align-items:center;justify-content:flex-start;overflow:auto}
  #boardWrap{width:calc(100vw - 20px);height:calc(100vw - 20px);max-width:calc(100vh - 190px);max-height:calc(100vh - 190px)}
  #teamPanel{width:calc(100vw - 20px);display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
}
#boardWrap{position:relative;flex-shrink:0}
#board{position:absolute;inset:0;background:var(--board-frame);border-radius:18px;padding:1.6%;
  display:grid;grid-template-columns:1.4fr repeat(7,1fr) 1.4fr;grid-template-rows:1.4fr repeat(7,1fr) 1.4fr;gap:0}
.cell{position:relative;background:var(--cell-bg);border:1px solid var(--cell-line);
  display:flex;flex-direction:column;overflow:hidden;user-select:none}
.cell .band{height:28%;flex-shrink:0;position:relative}
.cell .flag{position:absolute;top:0;right:6%;width:0;height:0;
  border-left:7px solid transparent;border-right:7px solid transparent;border-top:12px solid currentColor;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
.cell .body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px 3px;text-align:center;min-height:0}
.cell .uname{font-family:var(--jua);font-size:clamp(8px,1.4vmin,13px);color:var(--ink);line-height:1.15}
.cell .cicon{font-size:clamp(9px,1.7vmin,17px);line-height:1.1}
.cell .cval{font-size:clamp(6px,1.05vmin,10px);color:var(--muted);font-weight:800;line-height:1.1}
.cell.corner{background:var(--board-bg)}
.cell.corner .icon{font-size:clamp(13px,2.9vmin,28px);line-height:1.1}
.cell.corner .uname{font-size:clamp(9px,1.6vmin,14px)}
.cell.key{background:#fdf3d9} /* #f5c542 20% 를 흰색 위에 섞은 불투명 값 (보드 네이비 비침 방지) */
.cell.key .icon{font-size:clamp(11px,2.1vmin,20px);line-height:1.1}
.cell.tax{background:#fdecea} /* 세금 칸: 연한 레드 */
.cell.tax .icon{font-size:clamp(11px,2.1vmin,20px);line-height:1.1}
/* 건물 (집/호텔) — 소유 칸 컬러 밴드 왼쪽에 팀 색 SVG 로 표시 */
.cell .band .blds{position:absolute;left:5%;top:6%;height:88%;display:flex;gap:4%;align-items:flex-end;z-index:1}
.blds .bld{height:100%;aspect-ratio:1/1;display:block}
.blds .bld svg{height:100%;width:100%;display:block;filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
.blds .bld.drop{animation:bldDrop .55s cubic-bezier(.3,1.6,.4,1)}   /* 위에서 떨어져 착지 바운스 */
@keyframes bldDrop{0%{transform:translateY(-260%);opacity:0}55%{transform:translateY(0);opacity:1}72%{transform:translateY(-22%)}100%{transform:translateY(0)}}
.cell .dust{position:absolute;width:6px;height:6px;border-radius:50%;background:#c9bfa8;z-index:2;pointer-events:none;
  animation:dustPuff .6s ease-out forwards}
@keyframes dustPuff{from{transform:translate(0,0) scale(.5);opacity:.95}to{transform:translate(var(--dx),var(--dy)) scale(1.7);opacity:0}}
.cell .sparkle{position:absolute;left:50%;top:35%;font-size:clamp(14px,2.6vmin,24px);z-index:3;pointer-events:none;
  animation:sparklePop .9s ease-out forwards}
@keyframes sparklePop{0%{transform:translate(-50%,-50%) scale(.3);opacity:0}30%{transform:translate(-50%,-50%) scale(1.4);opacity:1}100%{transform:translate(-50%,-70%) scale(1);opacity:0}}
.cell.selectable{cursor:pointer;animation:selPulse 1s ease-in-out infinite;outline:3px dashed var(--gold);outline-offset:-4px;z-index:2}
@keyframes selPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.12)}}
#centerField{grid-area:2/2/9/9;background:var(--center-bg);border:1px solid var(--cell-line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2vmin;padding:2%;position:relative;z-index:1}
#gameTitle{font-family:var(--jua);font-size:clamp(16px,3.4vmin,32px);color:var(--board-frame);letter-spacing:.03em}
#timer{font-family:var(--jua);font-size:clamp(22px,4.6vmin,44px);color:var(--ink);
  background:#fff;border-radius:12px;padding:.2em .6em;border:2px solid var(--cell-line)}
#timer.low{color:#c62828;border-color:#c62828;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:.45}}
#curTeam{display:flex;align-items:center;gap:8px;font-weight:800;font-size:clamp(13px,2.2vmin,19px)}
#curTeam .dot{width:1.1em;height:1.1em;border-radius:50%;border:2px solid rgba(0,0,0,.15)}
/* 주사위 (div+dot, 절대배치 — 그리드 fr 트랙 0px 버그 회피) */
#dice{width:clamp(48px,9vmin,84px);height:clamp(48px,9vmin,84px);background:#fff;border-radius:16%;
  border:2px solid var(--cell-line);box-shadow:0 3px 8px rgba(0,0,0,.15);position:relative}
#dice.rolling{animation:diceShake .12s linear infinite}
@keyframes diceShake{0%{transform:rotate(-8deg) translateY(-2px)}50%{transform:rotate(8deg) translateY(2px)}100%{transform:rotate(-8deg) translateY(-2px)}}
#dice .pip{position:absolute;width:17%;height:17%;border-radius:50%;background:var(--ink);opacity:0;transform:translate(-50%,-50%)}
#dice .pip:nth-child(3n+1){left:26%}
#dice .pip:nth-child(3n+2){left:50%}
#dice .pip:nth-child(3n){left:74%}
#dice .pip:nth-child(-n+3){top:26%}
#dice .pip:nth-child(n+4):nth-child(-n+6){top:50%}
#dice .pip:nth-child(n+7){top:74%}
#dice .pip.on{opacity:1}
#rollBtn{min-height:52px;min-width:60%;border:none;border-radius:14px;background:var(--gold);color:#5c4300;
  font-family:var(--jua);font-size:clamp(15px,2.8vmin,24px);box-shadow:0 4px 0 #cfa32a;padding:0 1em}
#rollBtn:disabled{opacity:.45;box-shadow:none}
#rollBtn:not(:disabled):active{transform:translateY(2px);box-shadow:0 2px 0 #cfa32a}
#centerMsg{min-height:1.5em;font-weight:800;font-size:clamp(11px,2vmin,17px);color:var(--board-frame);text-align:center}

/* 말(토큰) */
#tokenLayer{position:absolute;inset:0;pointer-events:none;z-index:5}
.token{position:absolute;width:3.4%;height:3.4%;border-radius:50%;border:2px solid #fff;
  box-shadow:0 2px 5px rgba(0,0,0,.4);transform:translate(-50%,-50%);
  transition:left .15s ease, top .15s ease}
.token.fly{transition:left .45s cubic-bezier(.4,0,.2,1), top .45s cubic-bezier(.4,0,.2,1)}
.token.hop{animation:hop .15s ease}
@keyframes hop{50%{margin-top:-1.6%}}

/* 팀 패널 */
#teamPanel{display:flex;flex-direction:column;gap:8px}
.tcard{background:#fff;border-radius:14px;padding:10px 14px;box-shadow:0 3px 10px rgba(0,0,0,.08);
  border-left:8px solid var(--tc,#999);display:flex;align-items:center;gap:10px;transition:box-shadow .2s,transform .2s}
.tcard.cur{box-shadow:0 0 0 3px var(--tc,#999),0 6px 16px rgba(0,0,0,.15);transform:scale(1.02)}
.tcard .dot{width:20px;height:20px;border-radius:50%;background:var(--tc);border:2px solid rgba(0,0,0,.12);flex-shrink:0}
.tcard .info{flex:1;min-width:0}
.tcard .tname{font-family:var(--jua);font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tcard .tmeta{font-size:12px;color:var(--muted)}
.tcard .tscore{font-family:var(--jua);font-size:24px;color:var(--board-frame);min-width:2.4em;text-align:right}
.tcard .badges{display:flex;gap:4px}
.tcard .stat{font-size:11px;background:#f0f0f0;border-radius:8px;padding:1px 6px}
.tcard .stat.x2{background:var(--gold);font-weight:800}
.tcard .stat.rest{background:#cfe8f7}

/* 토스트 */
#toast{position:fixed;left:50%;top:12%;transform:translateX(-50%);background:var(--board-frame);color:#fff;
  font-family:var(--jua);font-size:clamp(15px,2.6vmin,22px);padding:.55em 1.2em;border-radius:99px;
  box-shadow:0 6px 20px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .25s;z-index:80;text-align:center;max-width:90vw}
#toast.on{opacity:1}

/* ───────── 문제 모달 ───────── */
#qModal{position:fixed;inset:0;background:rgba(30,58,95,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:12px}
#qModal.on{display:flex}
#qCard{background:#fff;border-radius:20px;border-top:10px solid var(--uc,#888);width:min(640px,96vw);
  max-height:92vh;overflow:auto;padding:20px 20px 18px;position:relative}
#qCard.shake{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
.q-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.q-badge{background:var(--uc,#888);color:#fff;font-size:12px;font-weight:800;border-radius:99px;padding:4px 12px}
.q-badge.kind{background:#fff;color:var(--uc,#888);border:2px solid var(--uc,#888)}
.q-badge.x2{background:var(--gold);color:#5c4300}
.q-badge.q-timer{background:#c62828;color:#fff;min-width:3.2em;text-align:center;font-size:14px}
.q-badge.q-timer.urgent{animation:blink .5s step-end infinite}
.q-text{font-size:clamp(16px,2.5vmin,22px);font-weight:800;line-height:1.55;margin-bottom:16px;word-break:keep-all}
.q-text .blank{display:inline-block;min-width:2.4em;border-bottom:3px solid var(--uc,#888);color:var(--uc,#888);
  text-align:center;font-weight:900;background:rgba(0,0,0,.04);border-radius:4px 4px 0 0;padding:0 .2em}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.q-opts button{min-height:64px;border:2px solid var(--cell-line);border-radius:14px;background:#fff;
  font-size:clamp(14px,2.2vmin,18px);font-weight:700;padding:8px 10px;word-break:keep-all;color:var(--ink)}
.q-opts button:disabled{cursor:default}
.q-opts button.right{background:#e8f5e9;border-color:#43a047;color:#1b5e20}
.q-opts button.wrong{background:#ffebee;border-color:#e53935;color:#b71c1c}
/* 문장 배열 */
.q-arrange .slots{min-height:64px;border:2px dashed var(--cell-line);border-radius:14px;background:#fafaf6;
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px;margin-bottom:12px}
.q-arrange .pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;justify-content:center}
.chip{min-height:52px;border:2px solid var(--uc,#888);border-radius:12px;background:#fff;color:var(--ink);
  font-size:clamp(15px,2.4vmin,19px);font-weight:800;padding:8px 14px}
.slots .chip{background:var(--uc,#888);color:#fff;border-color:var(--uc,#888)}
.q-confirm{width:100%;min-height:58px;border:none;border-radius:14px;background:var(--board-frame);color:#fff;
  font-family:var(--jua);font-size:20px}
.q-confirm:disabled{opacity:.35}
/* 타이핑(t) */
.q-type-row{display:flex;gap:10px;margin-bottom:8px}
.q-type-input{flex:1;min-width:0;min-height:58px;font-size:20px;border:2px solid var(--cell-line);border-radius:14px;
  padding:0 14px;font-family:inherit;color:var(--ink)}
.q-type-input:focus{outline:none;border-color:var(--uc,#888)}
.q-type-row .q-confirm{width:auto;min-width:104px;flex-shrink:0}
/* OX(x) */
.q-ox{display:flex;gap:14px;justify-content:center;margin-bottom:6px}
.q-ox button{flex:1;max-width:220px;min-height:96px;font-size:54px;font-weight:900;border-radius:18px;
  border:3px solid var(--cell-line);background:#fff;font-family:var(--jua)}
.q-ox button.o{color:#2e7d32}
.q-ox button.x{color:#c62828}
.q-ox button.right{background:#e8f5e9;border-color:#43a047}
.q-ox button.wrong{background:#ffebee;border-color:#e53935}
.q-ox button:disabled{cursor:default}
/* 짝맞추기(m) */
.q-match{display:flex;gap:12px}
.q-match .mcol{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.q-match button{min-height:56px;border:2px solid var(--cell-line);border-radius:12px;background:#fff;
  font-size:clamp(14px,2.2vmin,17px);font-weight:700;padding:6px 8px;word-break:keep-all;color:var(--ink)}
.q-match button.sel{border-color:var(--board-frame);background:#eef3fa;box-shadow:0 0 0 2px var(--board-frame)}
.q-match button.paired{border-color:#8fa8bd;background:#f4f8fb}
.q-match button.lock{background:#e8f5e9;border-color:#43a047;color:#1b5e20}
.q-match button.bad{background:#ffebee;border-color:#e53935;animation:shake .3s}
.q-feedback{text-align:center;font-family:var(--jua);font-size:clamp(20px,3.4vmin,30px);min-height:1.4em;margin-top:14px}
.q-feedback.ok{color:#2e7d32}
.q-feedback.no{color:#c62828}
.q-answer{text-align:center;font-size:clamp(15px,2.4vmin,20px);font-weight:800;color:var(--board-frame);
  background:#f4f7fa;border-radius:12px;padding:10px;margin-top:10px;display:none}
.q-answer.on{display:block}
.q-answer .blank{border-bottom:3px solid #2e7d32;color:#2e7d32;background:#e8f5e9;border-radius:4px;padding:0 .2em}

/* 황금열쇠 카드 */
#cardOverlay{position:fixed;inset:0;background:rgba(30,58,95,.55);display:none;align-items:center;justify-content:center;z-index:50}
#cardOverlay.on{display:flex}
#keyCard{width:min(300px,80vw);aspect-ratio:3/4;perspective:900px}
#keyCard .inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s}
#keyCard.flip .inner{transform:rotateY(180deg)}
#keyCard .face{position:absolute;inset:0;border-radius:18px;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:18px;text-align:center}
#keyCard .front{background:linear-gradient(135deg,#f5c542,#e8a820);color:#5c4300;font-family:var(--jua)}
#keyCard .front .k{font-size:64px}
#keyCard .front .t{font-size:26px}
#keyCard .back{background:#fff;transform:rotateY(180deg);border:4px solid var(--gold)}
#keyCard .back .icon{font-size:52px}
#keyCard .back .title{font-family:var(--jua);font-size:24px;color:var(--board-frame)}
#keyCard .back .desc{font-size:14px;color:var(--muted)}

/* 컨페티 */
.confetti{position:fixed;width:10px;height:14px;top:-20px;z-index:90;pointer-events:none;
  animation:confFall 1.1s ease-in forwards}
@keyframes confFall{to{transform:translateY(110vh) rotate(540deg);opacity:.6}}

/* ───────── 결과 화면 ───────── */
#resultScreen{align-items:center;justify-content:center;background:
  radial-gradient(circle at 50% 0%, #fdf9ec 0%, #efe8d6 70%);overflow:auto}
.result-card{background:#fff;border-radius:24px;box-shadow:0 12px 40px rgba(30,58,95,.18);
  padding:28px 26px;width:min(540px,94vw);margin:16px auto;text-align:center;border-top:10px solid var(--gold)}
.result-card h1{font-family:var(--jua);font-size:32px;color:var(--board-frame);margin-bottom:4px}
.result-card .sub{color:var(--muted);font-size:14px;margin-bottom:18px}
.rank-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.rank-row{display:flex;align-items:center;gap:12px;background:#fafaf6;border-radius:14px;padding:12px 16px;
  border-left:8px solid var(--tc)}
.rank-row.first{background:rgba(245,197,66,.18);box-shadow:0 0 0 2px var(--gold)}
.rank-row.me{outline:3px solid var(--board-frame);outline-offset:-3px}
.rank-row .medal{font-size:26px;width:36px}
.rank-row .dot{width:16px;height:16px;border-radius:50%;background:var(--tc);border:2px solid rgba(0,0,0,.12)}
.rank-row .rname{font-family:var(--jua);font-size:19px;flex:1;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-row .rlands{font-size:13px;color:var(--muted)}
.rank-row .rscore{font-family:var(--jua);font-size:24px;color:var(--board-frame)}
#submitBtn{width:100%;min-height:58px;border:none;border-radius:14px;background:#2e7d32;
  color:#fff;font-family:var(--jua);font-size:21px;margin-bottom:10px;display:none}
#submitBtn.show{display:block}
#submitBtn:disabled{opacity:.5}
#againBtn{width:100%;min-height:58px;border:none;border-radius:14px;background:var(--board-frame);
  color:#fff;font-family:var(--jua);font-size:22px}

/* ───────── 대기실(같이하기) ───────── */
#lobbyScreen{align-items:center;justify-content:center;background:
  radial-gradient(circle at 50% 10%, #fdf9ec 0%, #efe8d6 70%);overflow:auto}
.lobby-card{background:#fff;border-radius:24px;box-shadow:0 12px 40px rgba(30,58,95,.18);
  padding:28px 26px;width:min(460px,94vw);margin:16px auto;text-align:center;border-top:10px solid var(--board-frame)}
.lobby-card h1{font-family:var(--jua);font-size:26px;color:var(--board-frame);margin-bottom:14px}
#roomCodeDisplay{font-family:var(--jua);font-size:48px;letter-spacing:.18em;color:var(--board-frame);
  background:#fafaf6;border:2px dashed var(--cell-line);border-radius:14px;padding:10px 0;margin-bottom:16px}
#lobbyList{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.lobby-row{display:flex;align-items:center;gap:10px;background:#fafaf6;border-radius:12px;padding:10px 14px;text-align:left}
.lobby-row .dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.12)}
.lobby-row .lname{flex:1;font-weight:700;font-size:14px}
.lobby-row .conn{color:#43a047;font-size:12px;font-weight:800}
.lobby-row .conn.off{color:#c62828}
#lobbyStartBtn{width:100%;min-height:58px;border:none;border-radius:14px;background:var(--gold);
  color:#5c4300;font-family:var(--jua);font-size:22px;margin-bottom:10px}
#lobbyLeaveBtn{width:100%;min-height:52px;border:2px solid var(--cell-line);border-radius:14px;background:#fff;
  color:var(--muted);font-weight:800}

/* 모션 최소화 */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}

/* index → 9×9 그리드 좌표 */
function gridPos(i){
  if (i <= 8)  return {r:8, c:8-i};        // 아래줄: col 8→0
  if (i <= 15) return {r:8-(i-8), c:0};    // 왼쪽줄: row 7→1
  if (i <= 24) return {r:0, c:i-16};       // 윗줄: col 0→8
  return {r:i-24, c:8};                    // 오른쪽줄: row 1→7
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function hexToRgba(hex, alpha){
  const h = hex.replace('#','');
  return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${alpha})`;
}
function unitOf(id){ return subject.units.find(u => u.id === id); }
function cityOf(def){ const u = unitOf(def.unit); return u.cities[def.ci]; }

  return !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.databaseURL);
}
function loadScript(src){
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}
async function initFirebase(){
  if(!firebaseConfigured()) return false;
  if(fbReady) return true;
  try{
    await loadScript('https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js');
    fbApp = firebase.initializeApp(FIREBASE_CONFIG);
    fbDb = firebase.database();
    fbReady = true;
  }catch(e){ fbReady = false; }
  return fbReady;
}

function segInit(id, attr, cb){
  $(id).querySelectorAll('button').forEach(b => b.onclick = () => {
    $(id).querySelectorAll('button').forEach(x => x.classList.toggle('sel', x === b));
    cb(b.dataset[attr]);
  });
}
function stepperInit(id, min, max, cb){
  const box = $(id), val = box.querySelector('.st-val');
  box.querySelectorAll('button').forEach(b => b.onclick = () => {
    let v = +val.textContent + (+b.dataset.d);
    v = Math.max(min, Math.min(max, v));
    val.textContent = v;
    cb(v);
  });
}

  segInit('multiTimeSeg', 'm', v => { selMultiMin = +v; });
  if(firebaseConfigured()){
    $('multiTabBtn').style.display = '';
    initFirebase();   // 백그라운드 사전 로드 (실패해도 개인전/모둠전엔 영향 없음)
  }

  $('startBtn').onclick = () => {
    if(mode === 'multi'){ enterMultiFlow(); return; }
    startNewGame();
  };
  $('lobbyStartBtn').onclick = hostStartMultiGame;
  $('lobbyLeaveBtn').onclick = () => {
    leaveRoom();
    $('lobbyScreen').classList.remove('on');
    $('startScreen').classList.add('on');
  };
}

/* ============================================================
 * 같이하기(멀티) — Firebase Realtime Database
 * 방(rooms/{code})에는 players(참가자)와 state(게임 진행 상태)를 둔다.
 * 현재 턴인 플레이어의 기기만 state 를 쓰고, 나머지는 onValue 구독으로 렌더링만 한다.
 * ============================================================ */
async function enterMultiFlow(){
  const btn = $('startBtn');
  btn.disabled = true;
  const ok = await initFirebase();
  if(!ok){ btn.disabled = false; toast('Firebase 연결에 실패했어요. 설정을 확인하세요.', 2200); return; }
  try{
    if(joinType === 'create') await createRoom();
    else await joinRoom($('roomCodeInput').value.trim());
  }catch(e){
    // 가장 흔한 원인: DB 보안 규칙 미설정(Permission denied)
    const denied = /permission|denied/i.test(String(e && e.message || e));
    toast(denied ? '방을 만들 수 없어요. (DB 규칙 설정 필요 — 선생님께 문의)'
                 : '연결 문제로 실패했어요. 잠시 후 다시 시도하세요.', 2600);
  }finally{
    btn.disabled = false;
  }
}

async function createRoom(){
  subjectKey = $('subjectSel').value;
  subject = SUBJECTS[subjectKey];
  isHost = true;
  gameStartedFromRoom = false; resultShown = false;
  const uid = myUid();
  // 방 코드를 트랜잭션으로 만든다: 이미 존재하는 코드면 abort → 다른 코드로 재시도.
  // 두 기기가 같은 4자리를 동시에 뽑아도 한쪽만 성공하고, 남의 방을 덮어쓰지 않는다.
  let code = null, ref = null;
  for(let attempt = 0; attempt < 8; attempt++){
    const tryCode = genRoomCode();
    const tryRef = fbDb.ref('rooms/' + tryCode);
    const res = await tryRef.transaction(cur => {
      if(cur) return;   // 이미 있는 방 → abort
      return {
        phase: 'waiting',
        hostUid: uid,
        subjectKey,
        teamCount: selMultiTeamCount,
        duration: selMultiMin * 60,
        createdAt: Date.now(),
        players: { [uid]: { cls: player.cls, num: player.num, teamIdx: 0, connected: true, lastSeen: Date.now() } }
      };
    });
    if(res.committed){ code = tryCode; ref = tryRef; break; }
  }
  if(!code){ isHost = false; toast('방 코드 생성에 실패했어요. 다시 시도하세요.', 2200); return; }
  curRoomCode = code;
  roomRef = ref;
  myPlayerRef = roomRef.child('players/' + uid);
  myPlayerRef.onDisconnect().update({ connected: false });
  saveMultiSession();
  attachRoomListener();
}

async function joinRoom(code){
  if(!/^\d{4}$/.test(code)){ toast('4자리 방 코드를 입력하세요.', 1800); return; }
  const ref = fbDb.ref('rooms/' + code);
  const snap = await ref.get();
  if(!snap.exists()){ toast('방 코드를 찾을 수 없어요.', 1800); return; }
  const room = snap.val();
  if(room.phase !== 'waiting'){ toast('이미 시작됐거나 종료된 방이에요.', 1800); return; }
  const uid = myUid();
  const teamCount = room.teamCount;
  const me = { cls: player.cls, num: player.num };

  // 입장은 players 노드 전체를 트랜잭션으로 원자적 갱신한다.
  // 빈 슬롯 탐색 → 자기 정보 기록 → 커밋. 동시 입장으로 커밋이 충돌하면
  // Firebase 가 최신 값으로 자동 재시도하므로 두 학생이 같은 슬롯을 차지할 수 없다.
  let result;
  try{
    result = await ref.child('players').transaction(players => {
      players = players || {};
      // 이미 배정된 학생이면 새 슬롯이 아닌 기존 슬롯으로 복귀.
      // 반/번호 매칭은 그 자리가 "끊긴 상태"일 때만 — 접속 중인 다른 학생
      // (반/번호 기본값 1반 1번을 안 바꾼 경우 등)을 밀어내지 않는다.
      let key = players[uid] ? uid : null;
      if(!key){
        for(const k in players){
          const p = players[k];
          const dead = !p.connected || Date.now() - (p.lastSeen || 0) > 30000;
          if(p.cls === me.cls && p.num === me.num && dead){ key = k; break; }
        }
      }
      if(key){
        const slot = players[key].teamIdx;
        if(key !== uid) delete players[key];   // 기기·localStorage 가 바뀌어도 uid 하나로 통일
        players[uid] = { cls: me.cls, num: me.num, teamIdx: slot, connected: true, lastSeen: Date.now() };
        return players;
      }
      // 새 참가자: 가장 낮은 빈 슬롯을 찾아 배정
      const used = new Set(Object.values(players).map(p => p.teamIdx));
      let slot = -1;
      for(let i = 0; i < teamCount; i++){ if(!used.has(i)){ slot = i; break; } }
      if(slot < 0) return;   // 4자리(정원)가 다 찼으면 abort
      players[uid] = { cls: me.cls, num: me.num, teamIdx: slot, connected: true, lastSeen: Date.now() };
      return players;
    });
  }catch(e){ toast('입장 중 문제가 발생했어요. 다시 시도하세요.', 2000); return; }

  if(!result.committed){ toast('방이 가득 찼어요.', 1800); return; }
  const mine = (result.snapshot.val() || {})[uid];
  if(!mine){ toast('입장에 실패했어요. 다시 시도하세요.', 1800); return; }

  curRoomCode = code;
  isHost = false;
  gameStartedFromRoom = false; resultShown = false;
  subjectKey = room.subjectKey;
  subject = SUBJECTS[subjectKey];
  playerIdx = mine.teamIdx;
  roomRef = ref;
  myPlayerRef = ref.child('players/' + uid);
  myPlayerRef.onDisconnect().update({ connected: false });
  saveMultiSession();
  attachRoomListener();
}

function attachRoomListener(){
  $('startScreen').classList.remove('on');
  $('lobbyScreen').classList.add('on');
  roomListener = roomRef.on('value', snap => {
    const room = snap.val();
    if(!room) return;   // 방장이 나가서 삭제됐거나 아직 반영 전
    // 내 자리가 사라졌으면(같은 반/번호의 다른 기기가 복귀해 병합됨) 조용히 방을 떠난다
    if(room.phase !== 'finished' && room.players && !room.players[myUid()]){
      leaveRoom();
      $('lobbyScreen').classList.remove('on');
      $('gameScreen').classList.remove('on');
      $('startScreen').classList.add('on');
      toast('다른 기기가 같은 반/번호로 접속해 이 기기의 연결을 해제했어요.', 2600);
      return;
    }
    if(room.phase === 'waiting'){
      renderLobby(room);
    }else if(room.phase === 'playing'){
      if(!gameStartedFromRoom){
        gameStartedFromRoom = true;
        mode = 'multi';
        subjectKey = room.subjectKey; subject = SUBJECTS[subjectKey];
        const me = (room.players || {})[myUid()];
        if(me){ playerIdx = me.teamIdx; player = { cls: me.cls, num: me.num }; }  // 새로고침 재접속 시 반/번호 복원
        applyRoomState(room.state);
        $('lobbyScreen').classList.remove('on');
        enterGame();
        startHeartbeat();
        if(isHost) startHostWatchdog();
      }else if(turn !== playerIdx){
        // 내 턴이 아닐 때만 원격 상태 반영 (내 턴 진행 중엔 로컬이 최신 상태)
        applyRoomState(room.state);
        renderOwnership();
        positionAllTokens();
        updatePanel();
        updateHud();
        centerMsg(turn === playerIdx ? '내 차례! 주사위를 굴리세요' : `${teams[turn].name} 차례를 기다리는 중…`);
      }
    }else if(room.phase === 'finished'){
      if(gameStartedFromRoom) applyRoomState(room.state);
      showResult();
    }
  });
}

/* 슬롯 정합성 검사: 참가자들의 teamIdx 가 0..n-1 로 중복·공석 없이 채워졌는지 확인.
 * 정렬한 슬롯 번호가 [0,1,2,…] 와 정확히 일치해야 시작을 허용한다. */
function checkSlots(players){
  const arr = Object.values(players || {});
  const n = arr.length;
  if(n < 2) return { ok: false, count: n, reason: '참가자가 2명 이상이어야 시작할 수 있어요.' };
  const idxs = arr.map(p => p.teamIdx).sort((a,b) => a - b);
  for(let i = 0; i < idxs.length; i++){
    if(idxs[i] !== i) return { ok: false, count: n, reason: '슬롯이 어긋났어요(중복·공석). 학생들에게 새로고침을 안내하세요.' };
  }
  return { ok: true, count: n };
}

function renderLobby(room){
  $('roomCodeDisplay').textContent = curRoomCode;
  const uid = myUid();
  const list = Object.entries(room.players || {}).sort((a,b) => a[1].teamIdx - b[1].teamIdx);
  $('lobbyList').innerHTML = list.map(([pid,p]) => `
    <div class="lobby-row">
      <span class="dot" style="background:${TEAM_COLORS[p.teamIdx]}"></span>
      <span class="lname">${esc(p.cls)}반 ${esc(p.num)}번 ${pid===room.hostUid?'👑':''}${pid===uid?' (나)':''}</span>
      <span class="conn ${p.connected?'':'off'}">${p.connected?'● 접속중':'○ 끊김'}</span>
    </div>`).join('') || '<p style="color:var(--muted)">참가자를 기다리는 중…</p>';
  const me = (room.players || {})[uid];
  if(me) playerIdx = me.teamIdx;
  // 시작 버튼은 슬롯 정합성 검증을 통과했을 때만 활성화. 방장에게 문제를 표시한다.
  const v = checkSlots(room.players);
  $('lobbyStartBtn').style.display = (isHost && v.ok) ? '' : 'none';
  const warn = $('lobbyWarn');
  if(isHost && !v.ok && v.count >= 2){
    warn.textContent = v.reason; warn.style.display = '';
  }else{
    warn.style.display = 'none';
  }
}

async function hostStartMultiGame(){
  if(!isHost || !roomRef) return;
  const snap = await roomRef.get();
  const room = snap.val();
  if(!room || room.phase !== 'waiting') return;
  // 시작 직전 슬롯 정합성 재검증 — 중복·공석이면 시작하지 않고 방장에게 알린다.
  const v = checkSlots(room.players);
  if(!v.ok){ toast(v.reason, 2400); return; }
  const subj = SUBJECTS[room.subjectKey];
  // 실제 참가 인원수만큼만 팀을 만든다(빈 슬롯으로 진행하다 영원히 건너뛰는 것 방지).
  const teams0 = Array.from({length: v.count}, (_,i) => ({
    name: `${i+1}팀`, color: TEAM_COLORS[i], score: 0, pos: 0, lands: [], skip: false, doubleNext: false
  }));
  const decks0 = {};
  subj.units.forEach(u => decks0[u.id] = shuffle(u.questions.map((_,i)=>i)));
  await roomRef.update({
    phase: 'playing',
    state: { teams: teams0, turn: 0, owners: {}, builds: {}, decks: decks0,
             timeLeft: room.duration, totalTime: room.duration, rollAgain: false }
  });
}

/* Firebase Realtime Database 는 빈 배열/객체를 저장하지 않고 생략한다(읽으면 undefined).
 * 또 인덱스가 0..n 연속이면 배열, 아니면 객체로 돌려주므로, 원격 상태를 받을 때 정규화한다. */
function toArr(v){ return Array.isArray(v) ? v : (v && typeof v === 'object' ? Object.values(v) : []); }
function applyRoomState(s){
  if(!s) return;
  teams = toArr(s.teams).map(t => ({
    name: t.name, color: t.color,
    score: t.score || 0, pos: t.pos || 0,
    lands: toArr(t.lands), skip: !!t.skip, doubleNext: !!t.doubleNext
  }));
  turn = s.turn || 0;
  owners = s.owners || {};
  builds = s.builds || {};
  decks = {};
  const rawDecks = s.decks || {};
  for(const k in rawDecks) decks[k] = toArr(rawDecks[k]);
  timeLeft = typeof s.timeLeft === 'number' ? s.timeLeft : totalTime;
  totalTime = s.totalTime || totalTime;
  rollAgain = !!s.rollAgain;
}

function syncMultiState(){
  if(!roomRef) return;
  roomRef.child('state').update({ teams, turn, owners, builds, decks, timeLeft, rollAgain });
}

async function finishMultiGame(){
  timeUp = true;
  if(roomRef){
    await roomRef.update({
      phase: 'finished',
      expiresAt: Date.now() + 24*3600*1000,
      'state/timeLeft': 0, 'state/teams': teams, 'state/owners': owners, 'state/builds': builds
    });
  }
  showResult();
}

function startHeartbeat(){
  if(heartbeatId) clearInterval(heartbeatId);
  heartbeatId = setInterval(() => {
    // 트랜잭션: 내 노드가 삭제됐으면(다른 기기로 병합됨) abort — teamIdx 없는
    // 반쪽 노드를 되살려 슬롯을 깨뜨리지 않는다
    if(myPlayerRef) myPlayerRef.transaction(p => p ? Object.assign(p, { connected: true, lastSeen: Date.now() }) : undefined);
    saveMultiSession();   // 플레이 중 세션 신선도 유지 → 새로고침 복귀는 되고, 오래된 방은 만료되도록
  }, 8000);
}

function startHostWatchdog(){
  if(watchdogId) clearInterval(watchdogId);
  watchdogId = setInterval(async () => {
    if(!isHost || !roomRef || timeUp) return;
    const snap = await roomRef.child('players').get();
    const players = snap.val() || {};
    const cur = Object.values(players).find(p => p.teamIdx === turn);
    if(cur && Date.now() - (cur.lastSeen || 0) > 45000){
      hostForceSkipTurn();
    }
  }, 5000);
}

function hostForceSkipTurn(){
  toast('⏭ 응답이 없어 다음 팀으로 넘어가요', 1500);
  turn = (turn + 1) % teams.length;
  let guard = 0;
  while(teams[turn].skip && guard < teams.length){
    teams[turn].skip = false;
    turn = (turn + 1) % teams.length;
    guard++;
  }
  syncMultiState();
  beginTurn();
}

function stopMultiLoops(){
  if(heartbeatId){ clearInterval(heartbeatId); heartbeatId = null; }
  if(watchdogId){ clearInterval(watchdogId); watchdogId = null; }
}

function leaveRoom(){
  stopMultiLoops();
  if(roomRef && roomListener) roomRef.off('value', roomListener);
  if(myPlayerRef) myPlayerRef.transaction(p => p ? Object.assign(p, { connected: false }) : undefined);
  clearMultiSession();
  roomRef = null; roomListener = null; myPlayerRef = null;
  curRoomCode = null; isHost = false; gameStartedFromRoom = false;
}

function saveMultiSession(){
  try{ localStorage.setItem('bbm-multi-session', JSON.stringify({ code: curRoomCode, isHost, savedAt: Date.now() })); }catch(e){}
}
function clearMultiSession(){
  try{ localStorage.removeItem('bbm-multi-session'); }catch(e){}
}
function loadMultiSession(){
  try{
    const raw = localStorage.getItem('bbm-multi-session');
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

/* 건물 SVG (팀 색 = currentColor) — 집은 작은 집, 호텔은 창문 있는 큰 건물 */
/* width/height 속성 명시: Safari 는 속성 없는 SVG 의 폭을 0으로 계산해 건물이 사라질 수 있다 */
const HOUSE_SVG = '<svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 3 3 11h2.4v10h13.2V11H21z" fill="currentColor" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/></svg>';
const HOTEL_SVG = '<svg width="24" height="24" viewBox="0 0 24 24"><rect x="5" y="2.5" width="14" height="19" rx="1.2" fill="currentColor" stroke="#fff" stroke-width="1.6"/><rect x="8" y="6" width="3" height="3" fill="#fff"/><rect x="13" y="6" width="3" height="3" fill="#fff"/><rect x="8" y="11" width="3" height="3" fill="#fff"/><rect x="13" y="11" width="3" height="3" fill="#fff"/><rect x="10" y="16.5" width="4" height="5" fill="#fff"/></svg>';
function bldHtml(level){
  if(!level) return '';
  if(level >= MAX_BUILD) return `<span class="bld">${HOTEL_SVG}</span>`;   // 호텔은 집을 교체
  return `<span class="bld">${HOUSE_SVG}</span>`.repeat(level);            // 집 1~2개
}

function renderOwnership(){
  cellEls.forEach((el, i) => {
    const def = CELL_DEFS[i];
    if(def.type !== 'unit') return;
    const band = el.querySelector('.band');
    band.querySelectorAll('.flag,.blds').forEach(f => f.remove());
    const owner = owners[i];
    if(owner !== undefined && owner !== null && teams[owner]){
      const level = builds && builds[i];
      if(!level){
        // 깃발(삼각형)은 건물이 없는 소유 칸에만 — 건물이 있으면 건물이 소유를 보여준다
        const flag = document.createElement('span');
        flag.className = 'flag';
        flag.style.color = teams[owner].color;
        band.appendChild(flag);
      }
      if(level){
        const b = document.createElement('span');
        b.className = 'blds';
        b.style.color = teams[owner].color;
        b.innerHTML = bldHtml(level);
        band.appendChild(b);
      }
      el.style.background = hexToRgba(teams[owner].color, 0.08);
    }else{
      el.style.background = '';
    }
  });
}

/* 건설 모션: 새 건물이 위에서 떨어져 착지(바운스) + 먼지, 호텔 완공 시 반짝임 */
function animateBuild(pos, level){
  if(REDUCED) return;
  const el = cellEls[pos];
  const blds = el.querySelector('.blds');
  if(blds && blds.lastElementChild) blds.lastElementChild.classList.add('drop');
  for(let i=0;i<5;i++){
    const d = document.createElement('span');
    d.className = 'dust';
    d.style.setProperty('--dx', (Math.random()*24-12)+'px');
    d.style.setProperty('--dy', (-4 - Math.random()*10)+'px');
    d.style.left = (35 + Math.random()*30)+'%';
    d.style.top = '28%';
    el.appendChild(d);
    setTimeout(() => d.remove(), 700);
  }
  if(level >= MAX_BUILD){
    const s = document.createElement('span');
    s.className = 'sparkle';
    s.textContent = '✨';
    el.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

/* 말(토큰) */
function buildTokens(){
  const layer = $('tokenLayer');
  layer.innerHTML = '';
  tokenEls = teams.map((t,i) => {
    const el = document.createElement('div');
    el.className = 'token';
    el.style.background = t.color;
    el.style.zIndex = 10 + i;
    layer.appendChild(el);
    return el;
  });
  positionAllTokens();
}
function cellCenter(idx){
  const wrap = $('boardWrap'), cell = cellEls[idx];
  const wr = wrap.getBoundingClientRect(), cr = cell.getBoundingClientRect();
  return { x: (cr.left - wr.left + cr.width/2) / wr.width * 100,
           y: (cr.top  - wr.top  + cr.height/2) / wr.height * 100 };
}
const TOKEN_OFF = [[-1,-1],[1,-1],[-1,1],[1,1]];
function tokenXY(teamIdx){
  const c = cellCenter(teams[teamIdx].pos);
  return { x: c.x + TOKEN_OFF[teamIdx][0]*1.2, y: c.y + TOKEN_OFF[teamIdx][1]*1.2 };
}
function positionAllTokens(){
  teams.forEach((_,i) => {
    const p = tokenXY(i);
    tokenEls[i].style.left = p.x + '%';
    tokenEls[i].style.top  = p.y + '%';
  });
}
async function hopToken(teamIdx){
  const el = tokenEls[teamIdx], p = tokenXY(teamIdx);
  el.classList.remove('fly');
  el.classList.add('hop');
  el.style.left = p.x + '%'; el.style.top = p.y + '%';
  await sleep(150);
  el.classList.remove('hop');
}
async function flyToken(teamIdx){
  const el = tokenEls[teamIdx], p = tokenXY(teamIdx);
  el.classList.add('fly');
  el.style.left = p.x + '%'; el.style.top = p.y + '%';
  await sleep(450);
  el.classList.remove('fly');
}
window.addEventListener('resize', () => { if(teams && tokenEls.length) positionAllTokens(); });

/* 팀 패널 */
function buildPanel(){
  const panel = $('teamPanel');
  panel.innerHTML = '';
  teams.forEach((t,i) => {
    const card = document.createElement('div');
    card.className = 'tcard';
    card.style.setProperty('--tc', t.color);
    const tag = mode === 'solo' ? (i === playerIdx ? ' (나)' : ' 🤖')
              : mode === 'multi' ? (i === playerIdx ? ' (나)' : '') : '';
    card.innerHTML = `<span class="dot"></span>
      <div class="info"><div class="tname">${esc(t.name)}${tag}</div><div class="tmeta"><span class="lands"></span></div></div>
      <div class="badges"></div>
      <div class="tscore">0</div>`;
    panel.appendChild(card);
  });
  updatePanel();
}
function updatePanel(){
  [...$('teamPanel').children].forEach((card,i) => {
    const t = teams[i];
    card.classList.toggle('cur', i === turn);
    card.querySelector('.lands').textContent = `획득한 땅 ${t.lands.length}개`;
    card.querySelector('.tscore').textContent = t.score;
    const b = card.querySelector('.badges');
    b.innerHTML = (t.doubleNext ? '<span class="stat x2">×2</span>' : '') +
                  (t.skip ? '<span class="stat rest">🏝 쉼</span>' : '');
  });
}
function animateScore(teamIdx, from, to){
  const el = $('teamPanel').children[teamIdx].querySelector('.tscore');
  if(REDUCED || from === to){ el.textContent = to; return; }
  const start = performance.now(), dur = 500;
  (function tick(now){
    const p = Math.min(1, (now - start) / dur);
    el.textContent = Math.round(from + (to - from) * p);
    if(p < 1) requestAnimationFrame(tick);
  })(start);
}
function addScore(teamIdx, delta){
  const t = teams[teamIdx], from = t.score;
  t.score += delta;
  animateScore(teamIdx, from, t.score);
  updatePanel();
}

/* HUD */
function updateHud(){
  const t = teams[turn];
  $('curTeam').querySelector('.dot').style.background = t.color;
  $('curTeam').querySelector('.nm').textContent = isBot(turn) ? `${t.name} (봇) 차례` : `${t.name} 차례!`;
  $('rollBtn').disabled = busy || timeUp || isBot(turn) || (mode === 'multi' && turn !== playerIdx);
  renderTimer();
}
function renderTimer(){
  const m = Math.floor(Math.max(0,timeLeft)/60), s = Math.max(0,timeLeft)%60;
  const el = $('timer');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('low', timeLeft <= 60);
}
function centerMsg(msg){ $('centerMsg').textContent = msg || ''; }

let toastTimer = null;
function toast(msg, ms){
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(toastTimer);
  const dur = ms || 1400;
  toastTimer = setTimeout(() => el.classList.remove('on'), dur);
  return sleep(dur * 0.85);
}

/* 타이머 */
function startTimer(){
  clearInterval(timerId);
  renderTimer();
  timerId = setInterval(() => {
    timeLeft--;
    renderTimer();
    if(mode === 'multi'){
      if(isHost){
        if(roomRef) roomRef.child('state/timeLeft').set(Math.max(0, timeLeft));
        if(timeLeft <= 0){
          clearInterval(timerId);
          timeUp = true;
          $('rollBtn').disabled = true;
          if(!busy) finishMultiGame();
          else toast('⏰ 시간 종료! 이번 문제까지만 진행해요');
        }
      }
      return;   // 호스트가 아니면: 화면 표시만 로컬로, 종료 판정은 호스트 기기만 수행
    }
    save();
    if(timeLeft <= 0){
      clearInterval(timerId);
      timeUp = true;
      $('rollBtn').disabled = true;
      // 진행 중 이벤트(문제 모달 등)가 있으면 마저 처리 후 종료 (nextTurn 에서 처리)
      if(!busy) showResult();
      else toast('⏰ 시간 종료! 이번 문제까지만 진행해요');
    }
  }, 1000);
}

function enterGame(){
  $('startScreen').classList.remove('on');
  $('resultScreen').classList.remove('on');
  $('gameScreen').classList.add('on');
  buildBoard();
  buildTokens();
  buildPanel();
  startTimer();
  requestAnimationFrame(positionAllTokens);
  beginTurn();
}

/* ============================================================
 * 주사위 & 턴 진행
 * ============================================================ */
const PIP_MAP = {1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
function setDice(v){
  const pips = $('dice').querySelectorAll('.pip');
  pips.forEach((p,i) => p.classList.toggle('on', PIP_MAP[v].includes(i)));
}
function rollDice(fast){
  return new Promise(res => {
    const n = 1 + Math.floor(Math.random()*6);
    if(REDUCED){ setDice(n); return res(n); }
    const dice = $('dice');
    dice.classList.add('rolling');
    let ticks = 0;
    const total = fast ? 5 : 10;               // 봇은 0.4초, 사람은 0.8초 롤링
    const iv = setInterval(() => {
      setDice(1 + Math.floor(Math.random()*6));
      if(++ticks >= total){
        clearInterval(iv);
        dice.classList.remove('rolling');
        setDice(n);
        res(n);
      }
    }, 80);
  });
}

/* 턴 시작: 개인전이면 봇 턴 자동 진행 */
function beginTurn(){
  updateHud();
  updatePanel();
  if(timeUp){ return; }
  if(mode === 'multi' && turn !== playerIdx){
    centerMsg(`${teams[turn].name} 차례를 기다리는 중…`);   // 다른 플레이어 기기에서 진행, 나는 상태 수신만
    return;
  }
  if(isBot(turn)){
    centerMsg(`🤖 ${teams[turn].name} 진행 중…`);
    runBotTurn();       // await 하지 않음 — 스택을 비우고 비동기로 진행
  }else{
    centerMsg(mode === 'solo' ? '내 차례! 주사위를 굴리세요' : `${teams[turn].name} 차례예요!`);
  }
}

async function onRoll(){
  if(busy || timeUp || isBot(turn) || (mode === 'multi' && turn !== playerIdx)) return;
  busy = true;
  updateHud();
  centerMsg('');
  const n = await rollDice(false);
  await toast(`🎲 ${n}!`, 800);
  await moveForward(turn, n);
  await handleArrival(turn);
  endTurn();
}

async function runBotTurn(){
  busy = true;
  updateHud();
  await sleep(500);
  const n = await rollDice(true);
  await toast(`🤖 ${teams[turn].name} 🎲 ${n}!`, 700);
  await moveForward(turn, n);
  await handleArrival(turn);
  endTurn();
}

function endTurn(){
  busy = false;
  if(rollAgain && !timeUp){
    rollAgain = false;
    save();
    if(mode === 'multi') syncMultiState();
    if(isBot(turn)){ runBotTurn(); return; }   // 봇의 '한 번 더'도 자동 진행
    updateHud();
    centerMsg(`${teams[turn].name} 한 번 더!`);
    return;
  }
  rollAgain = false;
  nextTurn();
}

async function moveForward(teamIdx, steps){
  const t = teams[teamIdx];
  for(let i=0;i<steps;i++){
    t.pos = (t.pos + 1) % BOARD_SIZE;
    await hopToken(teamIdx);
    if(t.pos === 0){
      addScore(teamIdx, 50);
      toast('▶ 출발 통과! +50점');
    }
  }
}
async function moveBackward(teamIdx, steps){
  const t = teams[teamIdx];
  for(let i=0;i<steps;i++){
    t.pos = (t.pos + BOARD_SIZE - 1) % BOARD_SIZE;
    await hopToken(teamIdx);
  }
}
async function teleport(teamIdx, pos){
  teams[teamIdx].pos = pos;
  await flyToken(teamIdx);
}

function nextTurn(){
  save();
  if(timeUp){
    if(mode === 'multi'){ if(isHost) finishMultiGame(); return; }
    showResult();
    return;
  }
  turn = (turn + 1) % teams.length;
  // 무인도: 한 턴 쉬기 (모든 팀이 쉬는 극단 상황도 안전하게 처리)
  let guard = 0;
  while(teams[turn].skip && guard < teams.length){
    teams[turn].skip = false;
    toast(`🏝 ${teams[turn].name} 무인도에서 한 턴 쉬어요!`, 1600);
    turn = (turn + 1) % teams.length;
    guard++;
  }
  save();
  if(mode === 'multi') syncMultiState();
  beginTurn();
}

/* ============================================================
 * 칸 도착 이벤트
 * ============================================================ */
async function handleArrival(teamIdx){
  const t = teams[teamIdx];
  const def = CELL_DEFS[t.pos];
  switch(def.type){
    case 'start': break;   // 통과/도착 보너스는 이동 중 처리
    case 'unit':  await handleUnitCell(teamIdx, def); break;
    case 'key':   await handleGoldenKey(teamIdx); break;
    case 'tax': {
      const n = t.lands.length;
      const tax = n * 10;
      if(tax > 0){
        addScore(teamIdx, -tax);
        await toast(`🧾 세금 납부! 도시 ${n}개 × 10 = -${tax}점`, isBot(teamIdx) ? 1200 : 1700);
      }else{
        await toast(`🧾 세금 칸! ${t.name}, 도시가 없어 면제예요`, isBot(teamIdx) ? 1000 : 1400);
      }
      break;
    }
    case 'island':
      t.skip = true;
      updatePanel();
      await toast(`🏝 무인도! ${t.name}, 다음 턴 쉬어요`, isBot(teamIdx) ? 1100 : 1600);
      break;
    case 'travel': await handleWorldTravel(teamIdx); break;
    case 'double':
      t.doubleNext = true;
      updatePanel();
      await toast(`★ 더블찬스! ${t.name}의 다음 문제 점수 2배!`, isBot(teamIdx) ? 1100 : 1600);
      break;
  }
}

function consumeDouble(teamIdx){
  const t = teams[teamIdx];
  if(t.doubleNext){ t.doubleNext = false; updatePanel(); return 2; }
  return 1;
}

/* 문제에 도전: 사람이면 모달, 봇이면 정답률로 즉시 판정.
 * 반환값은 배점 계수: 1 = 정답, 0.5 = 재도전 성공(짝맞추기), 0 = 오답 */
async function attempt(teamIdx, unit, city, kindLabel, mult, timeLimit){
  if(isBot(teamIdx)){
    drawQuestion(unit);                       // 봇도 문제은행을 소모해 공정하게
    await toast(`🤖 ${teams[teamIdx].name} · ${city.n} ${kindLabel} 푸는 중…`, 900);
    return Math.random() < botAcc ? 1 : 0;    // 건설·방어·스피드도 봇 정답률로 판정
  }
  return askQuestion(drawQuestion(unit), unit, city, kindLabel, mult, timeLimit);
}

async function handleUnitCell(teamIdx, def){
  const t = teams[teamIdx];
  const unit = unitOf(def.unit);
  const city = cityOf(def);
  const pos = t.pos;
  const ownerIdx = owners[pos];
  const bot = isBot(teamIdx);

  if(ownerIdx === undefined || ownerIdx === null){
    // 주인 없는 도시: 문제 도전 → 정답 시 도시 가치만큼 점수 (재도전 성공은 절반)
    const mult = consumeDouble(teamIdx);
    const fac = await attempt(teamIdx, unit, city, '도전 문제', mult);
    if(fac){
      owners[pos] = teamIdx;
      t.lands.push(pos);
      const gain = Math.round(unit.value * mult * fac);
      addScore(teamIdx, gain);
      renderOwnership();
      await toast(`🚩 ${t.name} · ${city.n} 획득! +${gain}점`, bot ? 1100 : 1500);
    }else{
      await toast(bot ? `❌ ${t.name} 오답!` : '아쉬워요! 다음 기회에…', bot ? 900 : 1200);
    }
  }else if(ownerIdx === teamIdx){
    // 내 땅: 건설 문제 → 정답이면 건물 +1 단계 (집1 → 집2 → 호텔)
    const level = builds[pos] || 0;
    if(level >= MAX_BUILD){
      await toast(`🏨 ${t.name} 내 호텔 ${city.n} 도착!`, bot ? 900 : 1200);
    }else{
      const next = level + 1;
      const bldName = next >= MAX_BUILD ? '호텔' : `집 ${next}단계`;
      if(!bot) await toast(`🏗 내 땅 ${city.n}! 정답이면 ${bldName} 건설!`, 1400);
      const ok = await attempt(teamIdx, unit, city, '건설 문제', 1);   // 점수 없는 문제 — 더블찬스 소모 안 함
      if(ok){
        builds[pos] = next;
        renderOwnership();
        animateBuild(pos, next);
        await toast(next >= MAX_BUILD ? `🏨 ${city.n}에 호텔 완공! 통행료 4배!` : `🏠 ${city.n}에 ${bldName} 건설!`, bot ? 1100 : 1600);
      }else{
        await toast(bot ? `❌ ${t.name} 건설 실패…` : '아쉬워요! 건설 실패…', bot ? 900 : 1200);
      }
    }
  }else{
    // 남의 도시: 통행료 = 도시 가치 절반 × (1 + 건물 단계) — 호텔이면 4배
    const owner = teams[ownerIdx];
    const level = builds[pos] || 0;
    const toll = Math.round(unit.value / 2) * (1 + level);
    const bldTag = level >= MAX_BUILD ? ' 🏨호텔!' : level > 0 ? ` 🏠집${level}` : '';
    if(!bot) await toast(`${owner.name}의 땅 ${city.n}${bldTag} 통행료 ${toll}점!`, 1400);
    await toast('🎲 운명의 주사위…', 1000);   // 방어 문제 등장 여부 공개 전 연출
    if(Math.random() < TOLL_QUIZ_CHANCE){
      // 방어 문제 등장: 정답 → 면제 / 오답 → 전액 지불
      if(!bot) await toast('🛡 방어 찬스! 정답이면 통행료 면제!', 1300);
      const mult = consumeDouble(teamIdx);
      const ok = await attempt(teamIdx, unit, city, '통행료 방어 문제', mult);
      if(ok){
        await toast(`🎉 ${t.name} 통행료 면제!`, bot ? 1000 : 1300);
      }else{
        addScore(teamIdx, -toll * mult);
        addScore(ownerIdx, toll);
        await toast(`💸 통행료! ${t.name} -${toll*mult}점 / ${owner.name} +${toll}점`, bot ? 1300 : 1800);
      }
    }else{
      // 방어 기회 없음: 즉시 지불
      addScore(teamIdx, -toll);
      addScore(ownerIdx, toll);
      await toast(`💸 방어 기회 없음! ${t.name} -${toll}점 / ${owner.name} +${toll}점`, bot ? 1300 : 1800);
    }
  }
}

async function handleGoldenKey(teamIdx){
  const t = teams[teamIdx];
  const bot = isBot(teamIdx);
  const card = KEY_CARDS[Math.floor(Math.random() * KEY_CARDS.length)];
  await showKeyCard(card, bot);
  switch(card.id){
    case 'bonus': addScore(teamIdx, 80); await toast(`💰 ${t.name} +80점!`, 1100); break;
    case 'fine':  addScore(teamIdx, -40); await toast(`💸 ${t.name} -40점…`, 1100); break;
    case 'fwd2':
      await moveForward(teamIdx, 2);
      await handleArrival(teamIdx);
      break;
    case 'back2':
      await moveBackward(teamIdx, 2);
      await handleArrival(teamIdx);
      break;
    case 'tostart':
      await teleport(teamIdx, 0);
      addScore(teamIdx, 50);
      await toast(`▶ ${t.name} 출발로! +50점`, 1200);
      break;
    case 'again':
      rollAgain = true;
      await toast(`🎲 ${t.name} 한 번 더 굴리기!`, 1200);
      break;
    case 'x2':
      t.doubleNext = true;
      updatePanel();
      await toast(`✨ ${t.name} 다음 문제 점수 2배!`, 1200);
      break;
    case 'toisland':
      await teleport(teamIdx, ISLAND_IDX);
      t.skip = true;
      updatePanel();
      await toast(`🏝 ${t.name} 무인도로! 다음 턴 쉬어요`, 1400);
      break;
    case 'steal': {
      // 쟁탈전: 나를 제외한 최고 점수 팀에게 도전
      let target = -1;
      teams.forEach((tt,i) => { if(i !== teamIdx && (target < 0 || tt.score > teams[target].score)) target = i; });
      if(target < 0) break;
      if(!bot) await toast(`⚔️ ${teams[target].name}에게 도전! 정답이면 30점 강탈!`, 1500);
      const fac = await attempt(teamIdx, randUnit(), {n:'쟁탈전', f:'⚔️'}, '도전 문제', 1);
      if(fac){
        const amt = Math.round(30 * fac);
        addScore(teamIdx, amt);
        addScore(target, -amt);
        await toast(`⚔️ ${t.name}, ${teams[target].name}에게서 ${amt}점 강탈!`, bot ? 1200 : 1700);
      }else{
        addScore(teamIdx, -20);
        await toast(`😵 도전 실패… ${t.name} -20점`, bot ? 1000 : 1400);
      }
      break;
    }
    case 'defend': {
      if(!bot) await toast('🛡 방어전! 정답이면 무사해요!', 1400);
      const ok = await attempt(teamIdx, randUnit(), {n:'방어전', f:'🛡'}, '방어 문제', 1);
      if(ok) await toast(`🛡 ${t.name} 방어 성공!`, bot ? 1000 : 1300);
      else{
        addScore(teamIdx, -40);
        await toast(`💥 방어 실패… ${t.name} -40점`, bot ? 1000 : 1400);
      }
      break;
    }
    case 'collect': {
      // 전원 징수: 다른 모든 팀에게서 15점씩
      let got = 0;
      teams.forEach((_,i) => { if(i !== teamIdx){ addScore(i, -15); got += 15; } });
      addScore(teamIdx, got);
      await toast(`🪙 전원 징수! ${t.name} +${got}점`, bot ? 1200 : 1600);
      break;
    }
    case 'speed': {
      if(!bot) await toast('⚡ 스피드 찬스! 15초 안에 풀면 +100점!', 1500);
      const fac = await attempt(teamIdx, randUnit(), {n:'스피드 찬스', f:'⚡'}, '15초 문제', 1, 15);
      if(fac){
        const amt = Math.round(100 * fac);
        addScore(teamIdx, amt);
        await toast(`⚡ ${t.name} 성공! +${amt}점!`, bot ? 1100 : 1500);
      }else{
        await toast(`⏱ 아쉬워요! 다음 기회에…`, bot ? 900 : 1200);
      }
      break;
    }
  }
}

async function handleWorldTravel(teamIdx){
  const t = teams[teamIdx];
  if(isBot(teamIdx)){
    // 봇: 주인 없는 도시 우선, 없으면 아무 도시
    const unitIdxs = CELL_DEFS.map((d,i) => d.type === 'unit' ? i : -1).filter(i => i >= 0);
    const free = unitIdxs.filter(i => owners[i] === undefined || owners[i] === null);
    const pool = free.length ? free : unitIdxs;
    const dest = pool[Math.floor(Math.random() * pool.length)];
    await toast(`✈ ${t.name} 세계여행!`, 1000);
    await teleport(teamIdx, dest);
    await handleArrival(teamIdx);
    return;
  }
  await toast('✈ 세계여행! 이동할 칸을 터치하세요', 1800);
  centerMsg('✈ 이동할 칸을 터치하세요!');
  const dest = await new Promise(res => {
    cellEls.forEach((el, i) => {
      if(i === t.pos) return;
      el.classList.add('selectable');
      el.onclick = () => res(i);
    });
  });
  cellEls.forEach(el => { el.classList.remove('selectable'); el.onclick = null; });
  centerMsg('');
  await teleport(teamIdx, dest);
  await handleArrival(teamIdx);   // 도착 칸 이벤트 연쇄 처리
}

/* ============================================================
 * 문제 출제
 * ============================================================ */
function drawQuestion(unit){
  let deck = decks[unit.id];
  if(!deck || deck.length === 0){
    deck = decks[unit.id] = shuffle(unit.questions.map((_,i)=>i));  // 소진 시 리셋
  }
  const q = unit.questions[deck.pop()];
  return prepQuestion(q);
}
/* 보기/단어 셔플 (정답이 전부 index 0 이므로 필수)
 * o 형: 정답 단어(w) + 함정 단어(x)를 합쳐 셔플. 앞 w.length 개가 정답 순서 그대로면 재셔플 */
function prepQuestion(q){
  if(q.t === 'o'){
    const chips = [...q.w, ...(q.x || [])];
    const key = a => a.join('');
    let guard = 0;
    do{ shuffle(chips); }
    while(chips.slice(0, q.w.length).join('') === key(q.w) && ++guard < 20);
    return { t:'o', ko:q.ko, w:q.w, shuffled:chips };
  }
  if(q.t === 't') return { t:'t', q:q.q, ans:q.ans.map(a => String(a).trim().toLowerCase()) };
  if(q.t === 's'){
    // 철자 조립: 단어 글자 + 함정 글자(extra) 셔플. 앞 word.length 개가 그대로면 재셔플
    const letters = [...q.word.split(''), ...(q.extra || [])];
    let guard = 0;
    do{ shuffle(letters); }
    while(letters.slice(0, q.word.length).join('') === q.word && ++guard < 20);
    return { t:'s', q:q.q, word:q.word, shuffled:letters };
  }
  if(q.t === 'x') return { t:'x', q:q.q, a:!!q.a };
  if(q.t === 'm'){
    // 짝맞추기: 좌(영어)/우(한글) 각각 셔플
    return { t:'m', pairs:q.pairs,
             left: shuffle(q.pairs.map(p => p[0])),
             right: shuffle(q.pairs.map(p => p[1])) };
  }
  const order = shuffle(q.o.map((_,i)=>i));
  return { t:q.t, q:q.q, o:order.map(i => q.o[i]), a:order.indexOf(q.a) };
}

function blankHtml(text, fill){
  const parts = text.split('___').map(escBr);
  const filler = fill !== undefined ? `<span class="blank">${esc(fill)}</span>` : `<span class="blank">___</span>`;
  return parts.join(filler);
}

/* 문제 모달: 정답 여부를 resolve (단원 번호는 노출하지 않음 — 도시 이름만 표시)
 * timeLimit(초) 지정 시 카운트다운 표시, 시간 초과면 오답 처리 (스피드 찬스) */
function askQuestion(q, unit, city, kindLabel, mult, timeLimit){
  return new Promise(res => {
    const modal = $('qModal'), cardEl = $('qCard');
    cardEl.style.setProperty('--uc', unit.color);
    cardEl.classList.remove('shake');

    const head = `<div class="q-head">
        <span class="q-badge">${city.f} ${esc(city.n)}</span>
        <span class="q-badge kind">${esc(kindLabel)}</span>
        ${mult === 2 ? '<span class="q-badge x2">✨ 점수 2배!</span>' : ''}
        ${timeLimit ? `<span class="q-badge q-timer">⏱ ${timeLimit}초</span>` : ''}
      </div>`;

    let answerText;   // 정답 문장 노출용 HTML
    let timerIv = null;
    let timeoutNow = () => {};   // 유형별 분기에서 시간 초과 처리를 주입
    /* 결과는 배점 계수로 resolve: 1 = 정답, 0.5 = 재도전 성공(짝맞추기, 점수 절반), 0 = 오답 */
    function finish(v){
      const f = typeof v === 'number' ? v : (v ? 1 : 0);
      if(timerIv){ clearInterval(timerIv); timerIv = null; }
      const fb = cardEl.querySelector('.q-feedback');
      fb.textContent = f > 0 ? (f < 1 ? '🎉 정답! (재도전이라 점수 절반)' : '🎉 정답이에요!') : '😢 아쉬워요, 오답!';
      fb.classList.add(f > 0 ? 'ok' : 'no');
      if(f > 0) confetti(); else if(!REDUCED) cardEl.classList.add('shake');
      setTimeout(() => {
        const ans = cardEl.querySelector('.q-answer');
        ans.innerHTML = answerText;
        ans.classList.add('on');
        setTimeout(() => { modal.classList.remove('on'); res(f); }, 2000);  // 정답 문장 2초 노출
      }, REDUCED ? 100 : 700);
    }

    if(q.t === 'o'){
      /* 문장 배열 (함정 단어 포함 — w 개수만큼 배치하면 확인 가능) */
      answerText = `정답: ${esc(q.w.join(' '))}`;
      cardEl.innerHTML = `${head}
        <div class="q-text">🧩 순서대로 배열하세요 (안 쓰는 단어도 있어요!):<br>“${esc(q.ko)}”</div>
        <div class="q-arrange">
          <div class="slots"></div>
          <div class="pool"></div>
          <button class="q-confirm" disabled>확인</button>
        </div>
        <div class="q-feedback"></div><div class="q-answer"></div>`;
      const slots = cardEl.querySelector('.slots');
      const pool = cardEl.querySelector('.pool');
      const confirmBtn = cardEl.querySelector('.q-confirm');
      let done = false;
      timeoutNow = () => {   // 시간 초과 → 오답 처리 (스피드 찬스)
        if(done) return;
        done = true;
        confirmBtn.disabled = true;
        finish(false);
      };

      function refresh(){ confirmBtn.disabled = slots.children.length !== q.w.length; }
      q.shuffled.forEach(word => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'chip';
        chip.textContent = word;
        chip.onclick = () => {           // 칩 터치 → 배치 / 배치된 칩 터치 → 되돌리기
          if(done) return;
          if(chip.parentElement === pool){
            if(slots.children.length >= q.w.length) return;   // 정답 길이만큼만 배치 가능
            slots.appendChild(chip);
          }else{
            pool.appendChild(chip);
          }
          refresh();
        };
        pool.appendChild(chip);
      });
      confirmBtn.onclick = () => {
        if(done || slots.children.length !== q.w.length) return;
        done = true;
        confirmBtn.disabled = true;
        const arranged = [...slots.children].map(c => c.textContent);
        finish(arranged.join('') === q.w.join(''));
      };
    }else if(q.t === 't'){
      /* 타이핑: 한글 뜻 제시 → 영어 단어 직접 입력 (소문자 변환·앞뒤 공백 제거 후 비교) */
      answerText = `정답: ${esc(q.ans[0])}`;
      cardEl.innerHTML = `${head}
        <div class="q-text">⌨️ ${escBr(q.q)}</div>
        <div class="q-type-row">
          <input class="q-type-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="영어로 입력하세요">
          <button class="q-confirm">제출</button>
        </div>
        <div class="q-feedback"></div><div class="q-answer"></div>`;
      const input = cardEl.querySelector('.q-type-input');
      const submitBtn = cardEl.querySelector('.q-confirm');
      let done = false;
      const submit = () => {
        if(done) return;
        done = true;
        input.disabled = true; submitBtn.disabled = true;
        const v = input.value.trim().toLowerCase().replace(/\s+/g, ' ');
        finish(q.ans.includes(v));
      };
      submitBtn.onclick = submit;
      input.addEventListener('keydown', e => { if(e.key === 'Enter') submit(); });   // 엔터로도 제출
      timeoutNow = () => { if(done) return; done = true; input.disabled = true; submitBtn.disabled = true; finish(false); };
      setTimeout(() => input.focus(), 150);   // 포커스 → 태블릿 키보드 자동 표시
    }else if(q.t === 's'){
      /* 철자 조립: 글자 칩 + 함정 글자(extra) — o 유형과 동일 패턴(글자 단위) */
      answerText = `정답: ${esc(q.word)}`;
      cardEl.innerHTML = `${head}
        <div class="q-text">🔤 ${escBr(q.q)} (안 쓰는 글자도 있어요!)</div>
        <div class="q-arrange">
          <div class="slots"></div>
          <div class="pool"></div>
          <button class="q-confirm" disabled>확인</button>
        </div>
        <div class="q-feedback"></div><div class="q-answer"></div>`;
      const slots = cardEl.querySelector('.slots');
      const pool = cardEl.querySelector('.pool');
      const confirmBtn = cardEl.querySelector('.q-confirm');
      let done = false;
      const refresh = () => { confirmBtn.disabled = slots.children.length !== q.word.length; };
      q.shuffled.forEach(ch => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'chip';
        chip.textContent = ch;
        chip.onclick = () => {
          if(done) return;
          if(chip.parentElement === pool){
            if(slots.children.length >= q.word.length) return;
            slots.appendChild(chip);
          }else{
            pool.appendChild(chip);
          }
          refresh();
        };
        pool.appendChild(chip);
      });
      confirmBtn.onclick = () => {
        if(done || slots.children.length !== q.word.length) return;
        done = true;
        confirmBtn.disabled = true;
        finish([...slots.children].map(c => c.textContent).join('') === q.word);
      };
      timeoutNow = () => { if(done) return; done = true; confirmBtn.disabled = true; finish(false); };
    }else if(q.t === 'x'){
      /* OX 판단: a 가 true 면 O 가 정답 */
      answerText = `정답: ${q.a ? 'O' : 'X'}`;
      cardEl.innerHTML = `${head}
        <div class="q-text">${escBr(q.q)}</div>
        <div class="q-ox">
          <button type="button" class="o" data-v="1">O</button>
          <button type="button" class="x" data-v="0">X</button>
        </div>
        <div class="q-feedback"></div><div class="q-answer"></div>`;
      let done = false;
      const btns = cardEl.querySelectorAll('.q-ox button');
      btns.forEach(btn => {
        btn.onclick = () => {
          if(done) return;
          done = true;
          const pick = btn.dataset.v === '1';
          btns.forEach(b => {
            b.disabled = true;
            if((b.dataset.v === '1') === q.a) b.classList.add('right');
            else if(b === btn) b.classList.add('wrong');
          });
          finish(pick === q.a);
        };
      });
      timeoutNow = () => {
        if(done) return;
        done = true;
        btns.forEach(b => { b.disabled = true; if((b.dataset.v === '1') === q.a) b.classList.add('right'); });
        finish(false);
      };
    }else if(q.t === 'm'){
      /* 짝맞추기: 좌(영어)↔우(한글) 연결. 4쌍 연결 시 자동 채점,
       * 오답 쌍 표시 후 재시도 1회 — 재시도 성공은 정답 처리하되 점수 절반(0.5) */
      answerText = `정답: ${q.pairs.map(p => `${esc(p[0])} – ${esc(p[1])}`).join(' / ')}`;
      cardEl.innerHTML = `${head}
        <div class="q-text">🔗 단어와 뜻을 짝지으세요</div>
        <div class="q-match">
          <div class="mcol left"></div>
          <div class="mcol right"></div>
        </div>
        <div class="q-feedback"></div><div class="q-answer"></div>`;
      const colL = cardEl.querySelector('.mcol.left');
      const colR = cardEl.querySelector('.mcol.right');
      const answer = new Map(q.pairs.map(p => [p[0], p[1]]));
      let done = false, attemptNo = 1, selL = null;
      const linked = new Map();   // 왼쪽 버튼 → 오른쪽 버튼
      const mkBtn = (txt, col) => {
        const b = document.createElement('button');
        b.type = 'button';
        b.textContent = txt;
        col.appendChild(b);
        return b;
      };
      const lBtns = q.left.map(w => mkBtn(w, colL));
      const rBtns = q.right.map(w => mkBtn(w, colR));
      function grade(){
        const wrongL = [];
        linked.forEach((rb, lb) => {
          if(answer.get(lb.textContent) === rb.textContent){
            lb.classList.remove('paired'); rb.classList.remove('paired');
            lb.classList.add('lock'); rb.classList.add('lock');
          }else{
            wrongL.push(lb);
          }
        });
        if(!wrongL.length){
          done = true;
          finish(attemptNo === 1 ? 1 : 0.5);
          return;
        }
        if(attemptNo === 1){
          attemptNo = 2;
          wrongL.forEach(lb => {
            const rb = linked.get(lb);
            lb.classList.add('bad'); rb.classList.add('bad');
            setTimeout(() => {
              lb.classList.remove('bad', 'paired');
              rb.classList.remove('bad', 'paired');
            }, 900);
            linked.delete(lb);
          });
          toast('틀린 짝이 있어요! 한 번 더 도전!', 1400);
        }else{
          done = true;
          finish(false);
        }
      }
      lBtns.forEach(lb => lb.onclick = () => {
        if(done || lb.classList.contains('lock') || linked.has(lb)) return;
        if(selL) selL.classList.remove('sel');
        selL = lb;
        lb.classList.add('sel');
      });
      rBtns.forEach(rb => rb.onclick = () => {
        if(done || !selL || rb.classList.contains('lock') || [...linked.values()].includes(rb)) return;
        selL.classList.remove('sel');
        selL.classList.add('paired'); rb.classList.add('paired');
        linked.set(selL, rb);
        selL = null;
        if(linked.size === 4) grade();
      });
      timeoutNow = () => { if(done) return; done = true; finish(false); };
    }else{
      /* 4지선다 / 빈칸 */
      const qHtml = q.t === 'b' ? blankHtml(q.q) : escBr(q.q);
      answerText = q.t === 'b'
        ? `정답: ${blankHtml(q.q, q.o[q.a])}`
        : `정답: ${esc(q.o[q.a])}`;
      cardEl.innerHTML = `${head}
        <div class="q-text">${qHtml}</div>
        <div class="q-opts">${q.o.map((o,i) =>
          `<button type="button" data-i="${i}">${esc(o)}</button>`).join('')}</div>
        <div class="q-feedback"></div><div class="q-answer"></div>`;
      let done = false;
      timeoutNow = () => {   // 시간 초과 → 오답 처리, 정답만 공개
        if(done) return;
        done = true;
        cardEl.querySelectorAll('.q-opts button').forEach(b => {
          b.disabled = true;
          if(+b.dataset.i === q.a) b.classList.add('right');
        });
        finish(false);
      };
      cardEl.querySelectorAll('.q-opts button').forEach(btn => {
        btn.onclick = () => {
          if(done) return;
          done = true;
          const pick = +btn.dataset.i;
          const ok = pick === q.a;
          cardEl.querySelectorAll('.q-opts button').forEach(b => {
            b.disabled = true;
            const i = +b.dataset.i;
            if(i === q.a) b.classList.add('right');
            else if(i === pick) b.classList.add('wrong');
          });
          finish(ok);
        };
      });
    }
    modal.classList.add('on');
    if(timeLimit){
      // 카운트다운: 0이 되면 자동 오답 처리
      let left = timeLimit;
      const badge = cardEl.querySelector('.q-timer');
      timerIv = setInterval(() => {
        left--;
        if(badge){
          badge.textContent = `⏱ ${Math.max(0,left)}초`;
          if(left <= 5) badge.classList.add('urgent');
        }
        if(left <= 0){
          clearInterval(timerIv); timerIv = null;
          timeoutNow();
        }
      }, 1000);
    }
  });
}

/* 컨페티 (15개 이내) */
function confetti(){
  if(REDUCED) return;
  const colors = ['#f5c542','#e53935','#1e88e5','#43a047','#ec407a','#7c4dff'];
  for(let i=0;i<12;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = (10 + Math.random()*80) + 'vw';
    c.style.background = colors[i % colors.length];
    c.style.animationDelay = (Math.random()*0.25) + 's';
    c.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1600);
  }
}

/* ============================================================
 * 결과 화면 & 점수 제출
 * ============================================================ */
function showResult(){
  if(resultShown) return;   // 같이하기: phase 리스너와 로컬 종료 판정이 겹쳐 들어와도 중복 방지
  resultShown = true;
  clearInterval(timerId);
  stopMultiLoops();
  clearSave();
  $('gameScreen').classList.remove('on');
  $('resultScreen').classList.add('on');
  // 동점이면 획득 땅 수로 판정
  const ranked = teams.map((t,i) => ({...t, idx:i}))
    .sort((a,b) => b.score - a.score || b.lands.length - a.lands.length);
  const medals = ['🥇','🥈','🥉','🎖'];
  const isMine = mode !== 'group';   // 개인전/같이하기: "내 팀" 표시
  $('rankList').innerHTML = ranked.map((t,r) => `
    <div class="rank-row ${r===0?'first':''} ${isMine&&t.idx===playerIdx?'me':''}" style="--tc:${t.color}">
      <span class="medal">${medals[r] || ''}</span>
      <span class="dot"></span>
      <span class="rname">${esc(t.name)}${mode==='solo' ? (t.idx===playerIdx?' (나)':' 🤖') : (isMine&&t.idx===playerIdx?' (나)':'')}</span>
      <span class="rlands">땅 ${t.lands.length}개</span>
      <span class="rscore">${t.score}점</span>
    </div>`).join('');
  if(isMine){
    const myRank = ranked.findIndex(t => t.idx === playerIdx) + 1;
    $('resultSub').textContent = `${player.cls}반 ${player.num}번 — ${myRank}위! ${myRank===1?'🎉':''}`;
  }else{
    $('resultSub').textContent = `${ranked[0].name} 우승! 🎉`;
  }
  setupSubmitBtn();
  confetti();
}

function setupSubmitBtn(){
  const btn = $('submitBtn');
  const show = (mode === 'solo' || mode === 'multi') && submitConfigured();
  btn.classList.toggle('show', show);
  if(!show) return;
  const flagKey = 'bbm-submitted-' + gameId;
  const already = (() => { try{ return !!localStorage.getItem(flagKey); }catch(e){ return false; } })();
  btn.disabled = already;
  btn.textContent = already ? '✅ 제출 완료' : '📨 점수 제출';
  btn.onclick = async () => {
    btn.disabled = true;
    const me = teams[playerIdx];
    const body = new URLSearchParams();
    body.append(SUBMIT_FORM.entries.cls, player.cls);
    body.append(SUBMIT_FORM.entries.num, player.num);
    body.append(SUBMIT_FORM.entries.team, `${playerIdx+1}팀`);
    body.append(SUBMIT_FORM.entries.score, me.score);
    body.append(SUBMIT_FORM.entries.lands, me.lands.length);
    try{
      // no-cors: 응답 확인 불가 — 전송 후 안내만 (스펙)
      await fetch(SUBMIT_FORM.url, {
        method: 'POST', mode: 'no-cors',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: body.toString()
      });
    }catch(e){/* 오프라인 등 — 안내는 동일 */}
    try{ localStorage.setItem(flagKey, '1'); }catch(e){}
    btn.textContent = '✅ 제출 완료';
    toast('제출 완료! 선생님 화면에서 확인하세요', 2200);
  };
}

$('againBtn').onclick = () => {
  clearSave();
  if(mode === 'multi') leaveRoom();
  resultShown = false;
  $('resultScreen').classList.remove('on');
  $('startScreen').classList.add('on');
};

/* ============================================================
 * 부팅: 저장된 게임 확인
 * ============================================================ */
initStartScreen();
(function boot(){
  const s = loadSave();
  if(s){
    const m = Math.floor(s.timeLeft/60), sec = s.timeLeft%60;
    const who = s.mode === 'solo'
      ? `개인전 · ${s.player.cls}반 ${s.player.num}번 (${s.playerIdx+1}팀)`
      : `모둠전 · ${s.teams.map(t=>t.name).join(', ')}`;
    $('resumeInfo').textContent = `${SUBJECTS[s.subjectKey].name} · ${who} · 남은 시간 ${m}:${String(sec).padStart(2,'0')}`;
    $('resumeBox').classList.add('on');
    $('resumeBtn').onclick = () => { $('resumeBox').classList.remove('on'); resumeGame(s); };
    $('newGameBtn').onclick = () => { clearSave(); $('resumeBox').classList.remove('on'); };
    return;
  }
  // 같이하기 재접속: "새로고침"일 때만 이전 방으로 자동 복귀한다.
  // QR 재스캔·주소 직접 입력 등 새 방문(navigate)은 항상 새 시작 화면 —
  // 세션을 지워 이전 방이 자동으로 되살아나지 않게 한다.
  // (실수로 방에서 튕긴 학생은 방 코드 재입력으로 복귀 — 반/번호 매칭으로 기존 슬롯 유지)
  function isReloadNav(){
    try{
      const e = performance.getEntriesByType('navigation');
      if(e && e.length) return e[0].type === 'reload' || e[0].type === 'back_forward';
    }catch(err){}
    return false;   // 판별 불가 시 새 방문으로 간주 (자동 입장 안 함)
  }
  if(firebaseConfigured()){
    const ms = loadMultiSession();
    if(ms && ms.code && !isReloadNav()){
      clearMultiSession();   // QR 재스캔 → 새 화면, 죽은/이전 방 자동 입장 차단
    }else if(ms && ms.code){
      (async () => {
        const ok = await initFirebase();
        if(!ok) return;
        const ref = fbDb.ref('rooms/' + ms.code);
        const snap = await ref.get();
        const room = snap.val();
        const uid = myUid();
        // 죽은 방 판정 — 다음 중 하나면 자동 입장하지 않고 세션을 지운다.
        //  · 방이 없음 / 이미 종료(finished) / 만료(expiresAt 경과)
        //  · 내가 더는 그 방의 멤버가 아님(코드 재사용·정리됨) → update 로 되살아나는 것 방지
        //  · 세션이 너무 오래됨(6시간 초과, 예: 다음 수업 때 QR 재스캔)
        const expired = room && room.expiresAt && Date.now() > room.expiresAt;
        const tooOld = ms.savedAt && (Date.now() - ms.savedAt > 6*3600*1000);
        const member = room && room.players && room.players[uid];
        if(!room || room.phase === 'finished' || expired || tooOld || !member){
          clearMultiSession(); return;
        }
        // 살아있는 방 — 기존 슬롯(반/번호)으로 복귀. 새 슬롯을 차지하지 않는다.
        curRoomCode = ms.code; isHost = !!ms.isHost; roomRef = ref;
        playerIdx = member.teamIdx; player = { cls: member.cls, num: member.num };
        myPlayerRef = ref.child('players/' + uid);
        myPlayerRef.update({ connected: true, lastSeen: Date.now() });
        myPlayerRef.onDisconnect().update({ connected: false });
        gameStartedFromRoom = false; resultShown = false;
        saveMultiSession();
        attachRoomListener();
        toast('진행 중이던 방에 다시 연결했어요', 1800);
      })();
    }
  }
})();
</script>
